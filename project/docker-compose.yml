services:
  web:
    build: .
    container_name: drf-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./static:/app/static
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env


  nginx:
    image: nginx:alpine
    container_name: drf-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
    depends_on:
      - web